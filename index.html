<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Google Call Center Tycoon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--b:#4285F4;--r:#EA4335;--y:#FBBC05;--g:#34A853;--p:#8b5cf6;--o:#f97316;--dark:#1e293b}
body,html{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--dark);user-select:none}
#app{display:grid;grid-template-rows:76px 1fr 84px;height:100vh}
header{background:#fff;border-bottom:5px solid #000;display:flex;align-items:center;padding:0 10px;gap:7px;overflow-x:auto}
.hp{display:flex;align-items:center;gap:5px;border:3px solid #000;border-radius:40px;padding:4px 10px;background:#f8fafc;box-shadow:3px 3px 0 #000;white-space:nowrap;flex-shrink:0}
#money{font-family:'Press Start 2P';font-size:1.1rem;color:var(--g)}
#cps{font-family:'Press Start 2P';font-size:.5rem;color:#64748b}
.hbtn{border:3px solid #000;border-radius:8px;padding:8px 14px;cursor:pointer;font-family:'Press Start 2P';font-size:.55rem;box-shadow:3px 3px 0 #000;background:#fff;white-space:nowrap;flex-shrink:0}
.hbtn:active{transform:translate(1px,1px);box-shadow:none}
#world{display:flex;overflow:hidden;background:linear-gradient(160deg,#dbeafe,#eff6ff 60%,#dcfce7)}
#owrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
#office{width:95%;height:90%;background:#f8fafc;border:5px solid #000;border-radius:12px;
  display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);
  gap:8px;padding:10px;box-shadow:8px 8px 0 rgba(66,133,244,.3);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 33%,#e2e8f0 33%,#e2e8f0 calc(33% + 1px)),repeating-linear-gradient(90deg,transparent,transparent 25%,#e2e8f0 25%,#e2e8f0 calc(25% + 1px))}
.slot{background:rgba(255,255,255,.6);border:3px dashed #94a3b8;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;cursor:pointer;transition:.12s;position:relative;overflow:hidden}
.slot:hover{transform:scale(1.04);background:rgba(255,255,255,.9)}
.slot.on{background:#fff;border:4px solid #000;box-shadow:4px 4px 0 rgba(0,0,0,.15)}
.slot-hint{font-size:1.4rem;opacity:.1}
.ag{display:flex;flex-direction:column;align-items:center;position:relative}
.ag-fig{position:relative;animation:bob 1.6s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.ag-desk{width:70px;height:18px;background:linear-gradient(180deg,#a0522d,#7c3e1e);border:3px solid #000;border-radius:3px;box-shadow:3px 3px 0 #4a1a00;display:flex;align-items:center;justify-content:space-around;padding:0 4px}
.ag-kb{font-size:.5rem;animation:type .3s steps(1) infinite}
@keyframes type{50%{opacity:0}}
.ag-mon{width:14px;height:11px;background:#1e293b;border:2px solid #000;border-radius:2px;position:relative}
.ag-mon::after{content:'';position:absolute;top:2px;left:2px;right:2px;bottom:2px;background:var(--g);animation:blink .9s steps(1) infinite}
@keyframes blink{50%{opacity:.1}}
.stress-bar{width:56px;height:4px;background:#e2e8f0;border:1px solid #000;border-radius:3px;overflow:hidden;margin-top:2px}
.stress-fill{height:100%;border-radius:3px;transition:.5s}
.ag-acc{position:absolute;font-size:.65rem;top:0;right:0;background:#fff;border:1px solid #000;border-radius:3px;padding:1px}
#gcoin{position:absolute;width:130px;height:130px;background:radial-gradient(circle at 35% 35%,#ffe066,#fbbc05 55%,#b45309);border:6px solid #000;border-radius:50%;cursor:pointer;z-index:20;box-shadow:0 10px 0 #78350f,0 0 40px rgba(251,188,5,.5);display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P';font-size:2.8rem;transition:transform .07s,box-shadow .07s}
#gcoin:active{transform:scale(.87) translateY(8px);box-shadow:0 1px 0 #78350f}
#gcoin-lbl{position:absolute;top:calc(50% + 58px);left:50%;transform:translateX(-50%);font-family:'Press Start 2P';font-size:.52rem;color:#78350f;background:#fffbeb;border:3px solid #000;padding:4px 12px;border-radius:6px;font-weight:bold;white-space:nowrap;z-index:20}
.fl{position:absolute;font-size:2rem;animation:flt 3s ease-in-out infinite;pointer-events:none;display:none}
@keyframes flt{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.auto-pop{position:absolute;font-family:'Press Start 2P';font-size:.55rem;color:var(--y);text-shadow:1px 1px 0 #000;pointer-events:none;animation:apop 1.2s forwards;z-index:50}
@keyframes apop{to{transform:translateY(-70px) scale(.5);opacity:0}}
#sp{width:300px;background:#fff;border-left:5px solid #000;display:flex;flex-direction:column;flex-shrink:0}
#sp-tabs{display:flex;border-bottom:4px solid #000}
.stab{flex:1;padding:12px 2px;border:none;background:#f1f5f9;cursor:pointer;font-family:'Press Start 2P';font-size:.5rem;border-right:2px solid #000}
.stab:last-child{border-right:none}
.stab.on{background:var(--b);color:#fff}
#sp-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.sc{background:#f8fafc;border:4px solid #000;border-radius:10px;padding:8px;cursor:pointer;transition:.1s;display:flex;gap:7px;align-items:center}
.sc:hover{transform:translateX(3px);border-color:var(--b)}
.sc.lk{opacity:.38;filter:grayscale(1);pointer-events:none}
.sc-ico{width:36px;height:36px;border-radius:7px;border:3px solid #000;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.sc-tx{flex:1;min-width:0}
.sc-n{font-weight:900;font-size:.8rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-d{font-size:.68rem;color:#64748b}
.sc-p{font-family:'Press Start 2P';font-size:.55rem;color:var(--r);margin-top:2px}
.sc-ok{background:var(--g);color:#fff;font-size:.42rem;padding:1px 6px;border-radius:99px;display:inline-block}
#nav{background:#0f172a;display:flex;padding:6px;gap:5px}
.nb{flex:1;padding:14px 5px;background:#1e293b;color:#94a3b8;border:3px solid #334155;border-radius:10px;cursor:pointer;font-family:'Press Start 2P';font-size:.5rem;transition:.15s}
.nb:hover,.nb.on{background:var(--b);color:#fff;border-color:#fff;transform:translateY(-3px);box-shadow:0 4px 0 rgba(0,0,0,.4)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:800}
.overlay.show{display:flex}
.panel{background:#fff;border:6px solid #000;border-radius:16px;padding:20px;max-width:360px;width:92%;max-height:85vh;overflow-y:auto}
.panel h2{font-family:'Press Start 2P';font-size:.7rem;margin-bottom:12px;text-align:center}
.panel h3{font-size:.85rem;margin-bottom:8px}
.panel p{color:#64748b;font-size:.72rem;margin-bottom:10px}
.dpbtn{display:inline-block;margin:3px;padding:8px 14px;border:4px solid #000;cursor:pointer;font-family:'Press Start 2P';font-size:.38rem;border-radius:8px;box-shadow:3px 3px 0 #000}
.dpbtn:active{transform:translate(2px,2px);box-shadow:none}
.pb-wrap{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#fff;border:3px solid #000;border-radius:40px;padding:3px 12px;display:flex;align-items:center;gap:7px;z-index:15;white-space:nowrap}
.pb-track{width:90px;height:6px;background:#e2e8f0;border:2px solid #000;border-radius:99px;overflow:hidden}
#pb-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--b));border-radius:99px;transition:.5s;width:0}
#pb-txt{font-family:'Press Start 2P';font-size:.5rem;color:var(--p)}
#notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;border:4px solid #000;border-radius:10px;padding:8px 18px;font-family:'Press Start 2P';font-size:.4rem;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
#notif.show{opacity:1}
.pop{position:fixed;pointer-events:none;font-family:'Press Start 2P';font-size:.8rem;color:var(--y);text-shadow:2px 2px 0 #000;animation:pu .85s forwards;z-index:9999}
@keyframes pu{to{transform:translateY(-110px) scale(1.3);opacity:0}}
.event-box{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:var(--y);border:4px solid #000;border-radius:10px;padding:7px 16px;font-family:'Press Start 2P';font-size:.38rem;cursor:pointer;z-index:30;display:none;white-space:nowrap}
#daily-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1100}
#daily-overlay.show{display:flex}
.daily-box{background:#fff;border:8px solid var(--y);border-radius:20px;padding:28px;text-align:center;max-width:300px}
.daily-box h2{font-family:'Press Start 2P';font-size:.7rem;color:var(--y);margin-bottom:8px}
.mission-item{background:#f8fafc;border:3px solid #000;border-radius:9px;padding:9px;margin-bottom:7px}
.mission-item h4{font-size:.72rem;margin-bottom:3px}
.mission-item p{font-size:.6rem;color:#64748b}
.mission-item.done{background:#dcfce7;border-color:var(--g)}
.m-bar{height:5px;background:#e2e8f0;border:2px solid #000;border-radius:3px;overflow:hidden;margin-top:5px}
.m-fill{height:100%;background:var(--g);transition:.5s}
.m-rew{font-family:'Press Start 2P';font-size:.38rem;color:var(--p);margin-top:3px}
.lb-row{display:flex;align-items:center;gap:9px;padding:8px;border:3px solid #000;border-radius:8px;margin-bottom:5px;background:#f8fafc}
.lb-rank{font-family:'Press Start 2P';font-size:.55rem;color:var(--y);width:22px}
.lb-name{flex:1;font-weight:900;font-size:.78rem}
.lb-score{font-family:'Press Start 2P';font-size:.5rem;color:var(--g)}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:.72rem}
.stat-row b{font-family:'Press Start 2P';font-size:.45rem;color:var(--b)}
.aug-item{background:#f1f5f9;border:3px solid #000;border-radius:7px;padding:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;transition:.1s}
.aug-item:hover{background:#e2e8f0}
.aug-item.done{opacity:.5;pointer-events:none;background:#dcfce7}
.tier-badge{font-size:.55rem;padding:2px 7px;border:2px solid #000;border-radius:99px;font-weight:900;display:inline-block;margin-bottom:4px}
</style></head>
<body>
<div id="app">
<header>
  <div class="hp"><span>🪙</span><div><div id="money">$0</div><div id="cps">+0/s</div></div></div>
  <div class="hp" style="border-color:var(--p)"><span>⭐</span><span id="pcount" style="font-family:'Press Start 2P';font-size:.6rem;color:var(--p)">P0</span></div>
  <div class="hp" style="border-color:var(--r)"><span>🖱️</span><span id="cv" style="font-family:'Press Start 2P';font-size:.55rem;color:var(--r)">$1</span></div>
  <select class="hbtn" onchange="setLang(this.value)" id="lang-sel"><option value="fr">🇫🇷</option><option value="en">🇬🇧</option><option value="pt">🇧🇷</option></select>
  <button class="hbtn" style="background:var(--y)" onclick="document.getElementById('fi').click()">📸</button>
  <button class="hbtn" style="background:var(--g);color:#fff" onclick="show('missions-ov')">🎯</button>
  <button class="hbtn" style="background:var(--b);color:#fff" onclick="show('lb-ov')">🏆</button>
  <button class="hbtn" style="background:var(--o);color:#fff" onclick="show('stats-ov')">📊</button>
  <button class="hbtn" style="background:var(--p);color:#fff" onclick="show('prest-ov')">⭐</button>
  <button class="hbtn" style="background:var(--r);color:#fff" onclick="if(confirm('Reset?'))resetGame()">↺</button>
  <input type="file" id="fi" style="display:none" accept="image/*">
</header>
<div id="world">
  <div id="owrap">
    <div class="pb-wrap"><span id="pb-txt">P0</span><div class="pb-track"><div id="pb-fill"></div></div></div>
    <div id="office"></div>
    <div id="gcoin" onclick="doCoinClick(event)">G</div>
    <div id="gcoin-lbl">CLIC!</div>
    <div class="event-box" id="ev-box" onclick="claimEvent()"></div>
    <div class="fl" id="fl-p" style="bottom:14%;left:3%">🌴</div>
    <div class="fl" id="fl-t" style="top:12%;left:5%">🏆</div>
    <div class="fl" id="fl-c" style="bottom:14%;right:3%">☕</div>
    <div class="fl" id="fl-r" style="top:12%;right:5%">🤖</div>
    <div class="fl" id="fl-d" style="top:48%;left:2%">🪩</div>
    <div class="fl" id="fl-w" style="bottom:30%;right:2%">📺</div>
  </div>

  <!-- LEADERBOARD STRIP always visible -->
  <div id="lb-strip" style="width:200px;background:#0f172a;border-left:5px solid #000;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden">
    <div style="background:var(--y);border-bottom:4px solid #000;padding:10px;text-align:center;font-family:'Press Start 2P';font-size:.52rem;color:#000">🏆 CLASSEMENT</div>
    <div id="lb-strip-name-wrap" style="display:flex;padding:6px;gap:4px;border-bottom:3px solid #334155">
      <input id="lb-strip-inp" placeholder="Votre nom..." style="flex:1;border:3px solid #fff;padding:5px;font-size:.7rem;background:#1e293b;color:#fff;border-radius:6px;min-width:0">
      <button onclick="saveToLBOnline()" style="background:var(--g);color:#fff;border:3px solid #fff;padding:5px 8px;cursor:pointer;font-family:'Press Start 2P';font-size:.38rem;border-radius:6px">OK</button>
    </div>
    <div id="my-rank-strip" style="background:#1e3a5f;border-bottom:3px solid #334155;padding:6px 8px;font-family:'Press Start 2P';font-size:.42rem;color:var(--y);text-align:center">📍 Mon rang: --</div>
    <div id="lb-strip-list" style="flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px"></div>
    <div style="padding:6px;border-top:3px solid #334155">
      <button onclick="refreshLB()" style="width:100%;background:#1e293b;color:#64748b;border:2px solid #334155;padding:6px;cursor:pointer;font-family:'Press Start 2P';font-size:.38rem;border-radius:6px">↻ Actualiser</button>
    </div>
  </div>
  <div id="sp">
    <div id="sp-tabs">
      <button class="stab on" onclick="switchTab('agents',this)">👥</button>
      <button class="stab" onclick="switchTab('tech',this)">🔧</button>
      <button class="stab" onclick="switchTab('click',this)">🖱️</button>
      <button class="stab" onclick="switchTab('decor',this)">🎨</button>
      <button class="stab" onclick="switchTab('bots',this)">🤖</button>
      <button class="stab" onclick="switchTab('prestige',this)">⭐</button>
    </div>
    <div id="sp-body"></div>
  </div>
</div>
<div id="nav">
  <button class="nb on" onclick="setNav('agents',this)">👥 Agents</button>
  <button class="nb" onclick="setNav('tech',this)">🔧 Tech</button>
  <button class="nb" onclick="setNav('click',this)">🖱️ Click</button>
  <button class="nb" onclick="setNav('decor',this)">🎨 Décor</button>
  <button class="nb" onclick="setNav('bots',this)">🤖 Bots</button>
</div>
</div>
<!-- OVERLAYS -->
<div class="overlay" id="dp-ov"><div class="panel" id="dp-box"></div></div>
<div class="overlay" id="prest-ov"><div class="panel" id="prest-box"></div></div>
<div class="overlay" id="lb-ov"><div class="panel" style="border-color:var(--b)"><h2 style="color:var(--b)">🏆 CLASSEMENT</h2><div id="lb-name-wrap" style="margin-bottom:10px;display:flex;gap:5px"><input id="lb-name-inp" placeholder="Votre nom..." style="flex:1;border:3px solid #000;padding:6px;font-family:'Nunito';font-size:.8rem"><button class="dpbtn" style="background:var(--b);color:#fff" onclick="saveToLB()">OK</button></div><div id="lb-list"></div></div></div>
<div class="overlay" id="missions-ov"><div class="panel" style="border-color:var(--g)"><h2 style="color:var(--g)">🎯 MISSIONS</h2><div id="missions-list"></div></div><button class="dpbtn" style="position:fixed;top:10px;right:10px;background:var(--r);color:#fff;z-index:810" onclick="hide('missions-ov')">✖</button></div>
<div class="overlay" id="stats-ov"><div class="panel" style="border-color:var(--o)"><h2 style="color:var(--o)">📊 STATS</h2><div id="stats-list"></div><div style="text-align:center;margin-top:10px"><div class="dpbtn" style="background:var(--o);color:#fff" onclick="hide('stats-ov')">✖ Fermer</div></div></div></div>
<div id="daily-overlay"><div class="daily-box"><h2>🎁 BONUS DU JOUR!</h2><div id="daily-reward" style="font-size:2.5rem;margin:10px 0"></div><p id="daily-txt" style="font-family:'Press Start 2P';font-size:.5rem;color:var(--g)"></p><div class="dpbtn" style="background:var(--y);margin-top:10px" onclick="claimDaily()">RÉCUPÉRER!</div></div></div>
<div id="notif"></div>
<script>

function setLang(l){lang=l;renderShop(curTab);}

  {id:'sup1',name:'Alejandra',origin:'🇦🇷',tier:2,income:100,price:40000,skin:'#f0c27f',hair:'#1a0800',shirt:'#8b5cf6',desc:'Convainc tout le monde de tout'},

  {id:'sup3',name:'Yuki',origin:'🇯🇵',tier:2,income:200,price:150000,skin:'#fde8d0',hair:'#000',shirt:'#ec4899',desc:'Productivité de 200%... en dormant'},
  // TIER 4 - Team Leaders
  {id:'tl1',name:'Mehmet',origin:'🇹🇷',tier:3,income:800,price:600000,skin:'#c8865a',hair:'#111',shirt:'#dc2626',desc:'Gère 50 agents d\'une seule voix'},
  {id:'tl2',name:'Sofia',origin:'🇮🇹',tier:3,income:1000,price:1000000,skin:'#f0c27f',hair:'#4a1a00',shirt:'#7c3aed',desc:'Les clients rappellent pour elle'},
  {id:'tl3',name:'Jan',origin:'🇳🇱',tier:3,income:1500,price:2000000,skin:'#fde8d0',hair:'#d4a000',shirt:'#0369a1',desc:'Dit non directement et efficacement'},

// ── TICK ──
function tick(){
  let base=0;G.slots.forEach((s,i)=>{if(s){const sf=Math.max(.5,1-G.stress[i]*.005);base+=s.income*(G.agentUpgs[i]||1)*sf;}});
  const tot=(base*G.techMult*G.decorMult+G.botCps)*G.prestMult*evMult;
  G.money+=tot/10;G.totalEarned+=tot/10;
  const cv=G.clickVal;
  document.getElementById('money').textContent='$'+fmt(G.money);
  document.getElementById('cps').textContent='+'+fmt(tot)+'/s';
  document.getElementById('cv').textContent='$'+fmt(cv);
  document.getElementById('pcount').textContent='P'+G.prestige;
  const prog=Math.min(100,Math.log10(Math.max(1,G.totalEarned))/14*100);
  document.getElementById('pb-fill').style.width=prog+'%';
  document.getElementById('pb-txt').textContent='P'+G.prestige+' '+Math.floor(prog)+'%';
  if(Math.random()<.01)save();
}

// ── OFFLINE ──
function checkOffline(){
  const diff=(Date.now()-G.lastSave)/1000;
  if(diff>60){
    let base=0;G.slots.forEach((s,i)=>{if(s)base+=s.income*(G.agentUpgs[i]||1);});
    const earned=base*G.techMult*G.decorMult*G.prestMult*Math.min(diff,86400)*.5;
    if(earned>1){G.money+=earned;notify('⏰ Hors ligne: +$'+fmt(earned));}
  }
  G.lastSave=Date.now();
}

// ── DAILY ──
function checkDaily(){
  const now=Date.now();
  if(now-G.lastDaily>86400000){
    const bonus=Math.max(100,G.money*.1);
    document.getElementById('daily-reward').textContent='🎁';
    document.getElementById('daily-txt').textContent='+$'+fmt(bonus);
    document.getElementById('daily-overlay').classList.add('show');
    window._dailyBonus=bonus;
  }
}
function claimDaily(){
  G.money+=window._dailyBonus||100;G.lastDaily=Date.now();
  document.getElementById('daily-overlay').classList.remove('show');
  notify('🎁 Bonus quotidien récupéré!');save();
}

function renderOffice(){
  const el=document.getElementById('office');el.innerHTML='';
  const hasHs=!!G.owned['hs1']||!!G.owned['hs2']||!!G.owned['hs3'];
  const hasMon=!!G.owned['mon1']||!!G.owned['mon2'];
  G.slots.forEach((ag,i)=>{
    const s=document.createElement('div');
    s.className='slot'+(ag?' on':'');
    if(ag){
      const sf=Math.max(0,100-G.stress[i]);
      const sc=sf>65?'#34A853':sf>35?'#FBBC05':'#EA4335';
      const upgLvl=Object.keys(G.agentUpgs).filter(k=>k==i).length;
      s.innerHTML=`<div class="ag">

        <div class="ag-fig">${drawAgent(ag,hasHs)}</div>

          ${hasMon?'<div class="ag-mon"></div>':''}
        </div>
        <div class="stress-bar"><div class="stress-fill" style="width:${sf}%;background:${sc}"></div></div>

      s.onclick=()=>openAgentPanel(i);

      s.innerHTML='<div class="slot-hint">+</div>';
      s.onclick=()=>switchTab('agents',null);
    }
    el.appendChild(s);
  });
}

function buyAgentUpg(slotIdx,upgId){
  const u=AGENT_UPGS.find(x=>x.id===upgId);const k=slotIdx+'_'+upgId;
  if(!u||G.owned[k]||G.money<u.price)return;
  G.money-=u.price;G.owned[k]=true;
  G.agentUpgs[slotIdx]=(G.agentUpgs[slotIdx]||1)*u.incMult;
  notify(T('bought'));openAgentPanel(slotIdx);save();
}

function fireAgent(){G.slots[pickedSlot]=null;G.stress[pickedSlot]=0;hide('dp-ov');renderOffice();}

    DECOR_ITEMS.forEach(u=>{const o=!!G.owned[u.id];const sc=mkCard(u.ico,u.name,u.desc,u.price,u.color,!o&&G.money<u.price||o,o);if(!o)sc.onclick=()=>buyShopItem('decor',u);el.appendChild(sc);});

    BOT_UPG.forEach(u=>{const o=!!G.owned[u.id];const sc=mkCard(u.ico,u.name,u.desc,u.price,u.color,!o&&G.money<u.price||o,o);if(!o)sc.onclick=()=>buyShopItem('bots',u);el.appendChild(sc);});

function mkCard(ico,name,desc,price,color,locked,owned){
  const d=document.createElement('div');
  d.className='sc'+(locked?' lk':'');
  d.innerHTML=`<div class="sc-ico" style="background:${color}20;border-color:${color}">${ico}</div>
    <div class="sc-tx"><div class="sc-n">${name}</div><div class="sc-d">${desc}</div>
    ${owned?`<span class="sc-ok">✓ ${T('owned')}</span>`:`<div class="sc-p">$${fmt(price)}</div>`}</div>`;
  return d;
}

// ── BUY ──
function buyAgent(ag){
  const idx=G.slots.findIndex(s=>!s);
  if(idx===-1){notify(T('full'));return;}
  if(G.money<ag.price)return;
  G.money-=ag.price;G.slots[idx]={...ag};G.stress[idx]=0;
  renderOffice();notify(T('bought')+' '+ag.origin+' '+ag.name);hide('dp-ov');save();
}

function buyShopItem(cat,item){
  if(G.money<item.price||G.owned[item.id])return;
  G.money-=item.price;G.owned[item.id]=true;
  if(cat==='tech'){G.techMult*=(item.mult||1);renderOffice();}
  else if(cat==='click'){G.clickVal+=(item.clickBonus||0);}
  else if(cat==='decor'){G.decorMult*=(item.dMult||1);if(item.fl){const f=document.getElementById(item.fl);if(f)f.style.display='block';}}
  else if(cat==='bots'){G.botCps+=(item.bCps||0);}
  notify(T('bought'));save();
}

// ── COIN ──
function doCoinClick(e){
  e.stopPropagation();
  G.totalClicks++;
  combo++;clearTimeout(comboTimer);
  comboTimer=setTimeout(()=>{combo=0;},1500);
  const mult=combo>10?3:combo>5?2:1;
  const v=G.clickVal*mult*evMult;
  G.money+=v;
  pop(e.clientX,e.clientY,`+$${fmt(v)}${mult>1?' x'+mult+'!':''}`);
}

// ── PRESTIGE ──
function calcPrestigeGain(){return Math.max(0,Math.floor(Math.log10(Math.max(1,G.totalEarned/1e5))));}
function doPrestige(){
  const gain=calcPrestigeGain();
  if(gain<1){notify('Pas assez pour Prestige! Gagnez plus.');return;}
  G.prestige+=gain;G.prestMult=1+G.prestige*.2;
  G.money=50;G.slots=new Array(12).fill(null);G.slots[0]={...AGENTS[0]};
  G.owned={};G.agentUpgs={};G.techMult=1;G.decorMult=1;G.botCps=.3;G.clickVal=1;G.totalEarned=0;
  G.stress=new Array(12).fill(0);
  document.querySelectorAll('.fl').forEach(f=>f.style.display='none');
  renderOffice();renderShop(curTab);notify('⭐ PRESTIGE x'+G.prestige+'! Mult x'+G.prestMult.toFixed(1));save();
}

// ── AUTO COINS VISUAL ──
function autoPop(){
  if(G.botCps<=0)return;
  const wrap=document.getElementById('owrap');
  const coin=document.getElementById('gcoin');
  if(!coin||!wrap)return;
  const cr=coin.getBoundingClientRect(),wr=wrap.getBoundingClientRect();
  const el=document.createElement('div');el.className='auto-pop';
  el.textContent='+$'+fmt(G.botCps/10);
  el.style.left=(cr.left-wr.left+Math.random()*60-20)+'px';
  el.style.top=(cr.top-wr.top+Math.random()*40)+'px';
  wrap.appendChild(el);setTimeout(()=>el.remove(),1300);
}

// ── MISSIONS ──
function checkMissions(){
  G.missions.forEach(m=>{
    if(m.done)return;
    let prog=0,done=false;
    if(m.type==='earn'){prog=G.totalEarned;done=prog>=m.target;}
    else if(m.type==='agents'){prog=G.slots.filter(Boolean).length;done=prog>=m.target;}
    else if(m.type==='hire'){done=G.slots.some(s=>s&&s.id===m.target);prog=done?1:0;}
    else if(m.type==='nations'){const ns=new Set(G.slots.filter(Boolean).map(s=>s.id.replace(/\d/,'')));prog=ns.size;done=prog>=m.target;}
    else if(m.type==='clicks'){prog=G.totalClicks;done=prog>=m.target;}
    else if(m.type==='bots'){prog=Object.keys(G.owned).filter(k=>k.startsWith('b')).length;done=prog>=m.target;}
    else if(m.type==='decors'){prog=Object.keys(G.owned).filter(k=>DECOR_ITEMS.some(d=>d.id===k)).length;done=prog>=m.target;}
    else if(m.type==='techs'){prog=Object.keys(G.owned).filter(k=>TECH_UPG.some(t=>t.id===k)).length;done=prog>=m.target;}
    else if(m.type==='prestige'){prog=G.prestige;done=prog>=m.target;}
    if(done&&!m.done){m.done=true;G.money+=m.reward;notify('🎯 Mission: '+m.name+' +$'+fmt(m.reward));}
  });
}

function renderMissions(){
  const el=document.getElementById('missions-list');
  if(!el)return;el.innerHTML='';
  G.missions.forEach(m=>{
    const prog=Math.min(m.target,m.done?m.target:0);
    const pct=m.done?100:0;
    el.innerHTML+=`<div class="mission-item${m.done?' done':''}">
      <h4>${m.done?'✅ ':''} ${m.name}</h4>
      <p>${m.desc}</p>
      <div class="m-bar"><div class="m-fill" style="width:${pct}%"></div></div>
      <div class="m-rew">🎁 Récompense: $${fmt(m.reward)}</div>
    </div>`;
  });
}

// ── LEADERBOARD ──
function saveToLB(){
  const name=document.getElementById('lb-name-inp').value.trim()||'Anonyme';
  const scores=JSON.parse(localStorage.getItem('LB_GCCT')||'[]');
  const idx=scores.findIndex(s=>s.name===name);
  if(idx>=0)scores[idx].score=Math.max(scores[idx].score,G.totalEarned);
  else scores.push({name,score:G.totalEarned});
  scores.sort((a,b)=>b.score-a.score);
  localStorage.setItem('LB_GCCT',JSON.stringify(scores.slice(0,20)));
  renderLB();notify('🏆 Score sauvegardé!');
}
function renderLB(){
  const el=document.getElementById('lb-list');if(!el)return;el.innerHTML='';
  const scores=JSON.parse(localStorage.getItem('LB_GCCT')||'[]');
  if(!scores.length){el.innerHTML='<p style="text-align:center;color:#64748b">Aucun joueur encore!</p>';return;}
  const medals=['🥇','🥈','🥉'];
  scores.forEach((s,i)=>{
    el.innerHTML+=`<div class="lb-row">
      <div class="lb-rank">${medals[i]||'#'+(i+1)}</div>
      <div class="lb-name">${s.name}</div>
      <div class="lb-score">$${fmt(s.score)}</div>
    </div>`;
  });
}

// ── STATS ──
function renderStats(){
  const el=document.getElementById('stats-list');if(!el)return;
  const tot=(G.slots.filter(Boolean).length);
  el.innerHTML=`
    <div class="stat-row"><span>💰 Total gagné</span><b>$${fmt(G.totalEarned)}</b></div>
    <div class="stat-row"><span>👥 Agents actifs</span><b>${tot}/12</b></div>
    <div class="stat-row"><span>🖱️ Clics total</span><b>${G.totalClicks}</b></div>
    <div class="stat-row"><span>⭐ Prestige</span><b>${G.prestige} étoiles</b></div>
    <div class="stat-row"><span>✖️ Multiplicateur</span><b>x${G.prestMult.toFixed(1)}</b></div>
    <div class="stat-row"><span>🤖 Bots /s</span><b>$${fmt(G.botCps)}</b></div>
    <div class="stat-row"><span>🎯 Missions</span><b>${G.missions.filter(m=>m.done).length}/${G.missions.length}</b></div>
  `;
}

// ── UTILS ──
function show(id){
  document.getElementById(id).classList.add('show');
  if(id==='lb-ov')renderLB();
  if(id==='missions-ov')renderMissions();
  if(id==='stats-ov')renderStats();
  if(id==='prest-ov'){const gain=calcPrestigeGain();document.getElementById('prest-box').innerHTML=`<h2 style="color:var(--p)">⭐ PRESTIGE</h2><p>Réinitialisez pour des bonus permanents.</p><p style="font-family:'Press Start 2P';font-size:.6rem;color:var(--p)">+${gain} ⭐ disponibles</p><div class="dpbtn" style="background:var(--p);color:#fff" onclick="doPrestige()">🚀 GO!</div><div class="dpbtn" onclick="hide('prest-ov')">↩ Retour</div>`;}
}
function hide(id){document.getElementById(id).classList.remove('show');}
// Close overlays on backdrop click
document.querySelectorAll&&setTimeout(()=>{
  document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show');});});
},500);

function pop(x,y,t){const p=document.createElement('div');p.className='pop';p.textContent=t;p.style.left=x+'px';p.style.top=y+'px';document.body.appendChild(p);setTimeout(()=>p.remove(),850);}
function notify(msg){const n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2500);}
function fmt(n){if(n>=1e15)return(n/1e15).toFixed(2)+'Q';if(n>=1e12)return(n/1e12).toFixed(2)+'T';if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toString();}
function save(){G.lastSave=Date.now();try{localStorage.setItem('GCCT_v6',JSON.stringify(G));}catch(e){}}
function load(){try{const s=localStorage.getItem('GCCT_v6');if(s){const d=JSON.parse(s);G={...G,...d};G.missions=G.missions||MISSIONS.map(m=>({...m}));Object.keys(G.owned||{}).forEach(k=>{const d=DECOR_ITEMS.find(x=>x.id===k);if(d&&d.fl){const f=document.getElementById(d.fl);if(f)f.style.display='block';}});}}catch(e){}}
function resetGame(){localStorage.removeItem('GCCT_v6');location.reload();}

// ── ONLINE LEADERBOARD (Google Sheets backend) ──
// Replace this URL with your Google Apps Script Web App URL
const LB_URL = 'https://script.google.com/macros/s/AKfycbwk0Hg7f9YM2DcBJKZCgXbNCWVVKdcx9FcfPeAVXLXFubl7HiCm9AEtz9NgqbIKfxQR/exec';
const USE_ONLINE = true; // Set to true after setting up Google Sheets

function saveToLBOnline(){
  const name = document.getElementById('lb-strip-inp').value.trim();
  if(!name){notify('Entrez votre nom!');return;}
  G.playerName = name;
  
  // Always save locally
  const scores = JSON.parse(localStorage.getItem('LB_GCCT')||'[]');
  const idx = scores.findIndex(s=>s.name===name);
  if(idx>=0) scores[idx].score = Math.max(scores[idx].score, G.totalEarned);
  else scores.push({name, score: G.totalEarned});
  scores.sort((a,b)=>b.score-a.score);
  localStorage.setItem('LB_GCCT', JSON.stringify(scores.slice(0,20)));
  
  // Try online if configured
  if(USE_ONLINE && LB_URL.indexOf('YOUR_SCRIPT')===-1){
    fetch(LB_URL+'?action=save&name='+encodeURIComponent(name)+'&score='+Math.floor(G.totalEarned))
      .then(r=>r.json()).then(()=>refreshLB()).catch(()=>renderLBStrip());
  } else {
    renderLBStrip();
  }
  notify('🏆 Score sauvegardé! Tu es sur le classement!');
  save();
}

function refreshLB(){
  if(USE_ONLINE && LB_URL.indexOf('YOUR_SCRIPT')===-1){
    fetch(LB_URL+'?action=get').then(r=>r.json()).then(data=>{
      const scores=data.map(d=>({name:d[0],score:Number(d[1])}));
      scores.sort((a,b)=>b.score-a.score);
      localStorage.setItem('LB_GCCT',JSON.stringify(scores.slice(0,20)));
      renderLBStrip();
    }).catch(()=>renderLBStrip());
  } else {
    renderLBStrip();
  }
}

function renderLBStrip(){
  const el = document.getElementById('lb-strip-list');
  if(!el) return;
  const scores = JSON.parse(localStorage.getItem('LB_GCCT')||'[]');
  const name = G.playerName || document.getElementById('lb-strip-inp').value.trim();
  
  // Find my rank
  const myRank = scores.findIndex(s=>s.name===name)+1;
  const rankEl = document.getElementById('my-rank-strip');
  if(rankEl){
    if(myRank>0) rankEl.textContent = '📍 Vous: #'+myRank+' / '+scores.length;
    else rankEl.textContent = '📍 Entrez votre nom!';
  }
  
  el.innerHTML = '';
  if(!scores.length){
    el.innerHTML = '<div style="color:#64748b;font-family:Press Start 2P;font-size:.38rem;text-align:center;padding:10px">Soyez le 1er!</div>';
    return;
  }
  
  const medals = ['🥇','🥈','🥉'];
  scores.slice(0,10).forEach((s,i)=>{
    const isMe = s.name===name;
    const div = document.createElement('div');
    div.style.cssText = `background:${isMe?'rgba(66,133,244,.3)':'#1e293b'};border:${isMe?'2px solid var(--b)':'2px solid #334155'};border-radius:6px;padding:6px;display:flex;align-items:center;gap:5px`;
    div.innerHTML = `<span style="font-size:.8rem;width:20px">${medals[i]||'#'+(i+1)}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:900;font-size:.7rem;color:${isMe?'var(--y)':'#fff'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${isMe?'⭐ ':''} ${s.name}</div>
        <div style="font-family:'Press Start 2P';font-size:.38rem;color:var(--g)">$${fmt(s.score)}</div>
      </div>`;
    el.appendChild(div);
  });
}

// Auto-refresh LB and auto-save score every 30s
setInterval(()=>{
  const name = G.playerName || document.getElementById('lb-strip-inp')?.value.trim();
  if(name) saveToLBOnline();
  renderLBStrip();
}, 30000);

// Initial LB render after load
setTimeout(()=>{
  renderLBStrip();
  if(G.playerName) document.getElementById('lb-strip-inp').value = G.playerName;
}, 1000);
